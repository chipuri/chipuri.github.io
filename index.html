<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html,body{
  margin:0;
  height:100%;
  background:black;
  cursor:pointer;
}

video{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
</style>
</head>

<body>

<video id="v" autoplay muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("v");

document.body.addEventListener("click", () => {
  video.muted = false;
  video.play();
}, { once: true });
</script>

</body>
</html>
